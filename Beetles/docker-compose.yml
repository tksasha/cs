services:
  db:
    image: postgres:18
    environment:
      POSTGRES_DB: beetles_development
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"

  api:
    build: .
    ports:
      - "3000:8080"
    environment:
      - ConnectionStrings__Development=Host=db;Database=beetles_development;Username=postgres;Password=postgres
      - ASPNETCORE_ENVIRONMENT=Development
    depends_on:
      - db
